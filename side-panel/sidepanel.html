<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Amazon Review Assistant</title>
  <link rel="stylesheet" href="panel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <nav class="top-bar">
    <div class="logo-group">
      <!-- <div class="symbol"></div> -->
      <span class="brand">SWAN Assistant</span>
    </div>
    <div class="status-badge">AI Powered</div>
  </nav>

  <div class="scroll-area">
    <div class="content-wrapper">

      <div class="welcome-card" id="welcome-card">
        <h2>👋 Welcome!</h2>
        <p>Navigate to any Amazon product page and I'll automatically summarize the reviews for you.</p>
      </div>

      <div id="loader" class="loader-wrapper" style="display: none;">
        <div class="scanning-line"></div>
        <p class="mono-text">Analyzing reviews...</p>
      </div>

      <div id="response-container" class="report-container" style="display: none;">
        <div class="report-header">
          <span class="report-title">Review Summary</span>
          <span class="timestamp" id="timestamp">Just now</span>
        </div>
        <div id="response-text" class="report-body">
        </div>
      </div>

    </div>
  </div>

  <script src="panel.js"></script>
</body>

</html>
